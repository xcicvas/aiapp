<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <title>SillyTavern</title>
    <link rel="stylesheet" href="/public/css/st-tailwind.css">
    <link rel="stylesheet" href="/public/css/mobile-styles.css">
    <link rel="stylesheet" href="/public/css/fontawesome.min.css">
    <link rel="stylesheet" href="/public/css/solid.min.css">
    <link rel="stylesheet" href="/public/css/brands.min.css">
    <link rel="stylesheet" href="/public/css/toastr.min.css">
    <link rel="stylesheet" href="/public/css/popup.css">
    <link rel="stylesheet" href="/public/css/chat-backups.css">
    <link rel="stylesheet" href="/public/css/loader.css">
    <link rel="icon" href="/public/favicon.ico">
</head>
<body>
    <div id="app" class="h-full bg-gray-900 text-gray-100 overflow-hidden">
        <div id="loading-screen" class="fixed inset-0 bg-gray-900 flex flex-col items-center justify-center z-50">
            <div class="loader"></div>
            <p class="mt-4 text-gray-400">Loading SillyTavern...</p>
        </div>

        <div id="main-container" class="hidden h-full flex flex-col">
            <header id="header" class="bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center justify-between safe-area-top">
                <div class="flex items-center gap-3">
                    <img src="/public/img/logo.svg" alt="Logo" class="h-8 w-8">
                    <h1 class="text-lg font-semibold text-white">SillyTavern</h1>
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-settings" class="p-2 hover:bg-gray-700 rounded-lg transition-colors" title="Settings">
                        <i class="fa-solid fa-gear text-xl"></i>
                    </button>
                </div>
            </header>

            <main id="main-content" class="flex-1 overflow-hidden flex flex-col">
                <div id="chat-container" class="flex-1 overflow-y-auto px-4 py-4 space-y-4">
                    <div id="welcome-message" class="flex flex-col items-center justify-center h-full text-center">
                        <img src="/public/img/logo.svg" alt="SillyTavern" class="h-24 w-24 mb-6 opacity-50">
                        <h2 class="text-2xl font-bold text-gray-300 mb-2">Welcome to SillyTavern</h2>
                        <p class="text-gray-500 mb-6 max-w-md">Connect to a SillyTavern server to start chatting with AI characters.</p>
                        <div id="connection-status" class="flex items-center gap-2 px-4 py-2 bg-gray-800 rounded-full">
                            <span class="w-3 h-3 rounded-full bg-red-500" id="status-dot"></span>
                            <span class="text-sm text-gray-400" id="status-text">Not Connected</span>
                        </div>
                    </div>
                </div>

                <div id="input-container" class="bg-gray-800 border-t border-gray-700 p-4 safe-area-bottom">
                    <div class="flex gap-2">
                        <input type="text" id="message-input" 
                            class="flex-1 bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                            placeholder="Type your message..." disabled>
                        <button id="send-btn" 
                            class="bg-purple-600 hover:bg-purple-700 disabled:bg-gray-600 disabled:cursor-not-allowed text-white px-6 py-3 rounded-lg font-medium transition-colors"
                            disabled>
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </main>

            <nav id="bottom-nav" class="bg-gray-800 border-t border-gray-700 px-4 py-2 safe-area-bottom">
                <div class="flex justify-around">
                    <button class="nav-btn flex flex-col items-center py-2 px-4 text-purple-400" data-view="chat">
                        <i class="fa-solid fa-comments text-xl mb-1"></i>
                        <span class="text-xs">Chat</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 px-4 text-gray-400" data-view="characters">
                        <i class="fa-solid fa-users text-xl mb-1"></i>
                        <span class="text-xs">Characters</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 px-4 text-gray-400" data-view="chats">
                        <i class="fa-solid fa-list text-xl mb-1"></i>
                        <span class="text-xs">Chats</span>
                    </button>
                    <button class="nav-btn flex flex-col items-center py-2 px-4 text-gray-400" data-view="settings">
                        <i class="fa-solid fa-sliders text-xl mb-1"></i>
                        <span class="text-xs">Settings</span>
                    </button>
                </div>
            </nav>
        </div>

        <div id="settings-panel" class="hidden fixed inset-0 bg-gray-900 z-40 overflow-y-auto">
            <header class="bg-gray-800 border-b border-gray-700 px-4 py-3 flex items-center">
                <button id="btn-close-settings" class="p-2 hover:bg-gray-700 rounded-lg mr-2">
                    <i class="fa-solid fa-arrow-left"></i>
                </button>
                <h2 class="text-lg font-semibold">Settings</h2>
            </header>
            <div class="p-4 space-y-4">
                <div class="bg-gray-800 rounded-lg p-4">
                    <h3 class="text-purple-400 font-medium mb-3">Connection</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">Server URL</label>
                            <input type="text" id="server-url" 
                                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                placeholder="http://localhost:8000">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-1">API Key</label>
                            <input type="password" id="api-key" 
                                class="w-full bg-gray-700 border border-gray-600 rounded-lg px-3 py-2 text-white placeholder-gray-400 focus:outline-none focus:border-purple-500"
                                placeholder="Optional">
                        </div>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-lg p-4">
                    <h3 class="text-purple-400 font-medium mb-3">Theme</h3>
                    <div class="space-y-2">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="theme" value="dark" checked class="text-purple-500">
                            <span>Dark</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="theme" value="light" class="text-purple-500">
                            <span>Light</span>
                        </label>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-lg p-4">
                    <h3 class="text-purple-400 font-medium mb-3">About</h3>
                    <p class="text-sm text-gray-400">SillyTavern Mobile v1.0.0</p>
                    <p class="text-sm text-gray-500 mt-1">Based on SillyTavern</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
