<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#111827">
    <title>AI Chat</title>

    <link rel="icon" href="./favicon.ico">

    <style>
        :root {
            --primary: #7C3AED;
            --bg: #111827;
            --surface: #1F2937;
            --text: #F9FAFB;
            --muted: #9CA3AF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        #app { width: 100%; height: 100%; display: flex; flex-direction: column; }

        /* Header */
        header {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #374151;
            flex-shrink: 0;
        }

        header h1 { font-size: 18px; font-weight: 600; }

        header button {
            width: 40px; height: 40px;
            border: none; border-radius: 10px;
            background: #374151;
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
        }

        /* Chat */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 80px;
        }

        .msg {
            display: flex;
            margin-bottom: 16px;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        .msg.user { justify-content: flex-end; }

        .msg .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .msg.user .avatar { background: var(--primary); }

        .msg .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            background: var(--surface);
            margin-left: 10px;
        }

        .msg.user .bubble {
            background: var(--primary);
            margin-left: 0;
            margin-right: 10px;
        }

        .msg .bubble p { margin: 0; line-height: 1.6; white-space: pre-wrap; }
        .msg .bubble .time { font-size: 11px; opacity: 0.6; margin-top: 6px; }

        /* Typing */
        .typing { display: flex; gap: 4px; }
        .typing span {
            width: 8px; height: 8px;
            background: var(--muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }

        /* Welcome */
        #welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 20px;
        }

        #welcome.hidden { display: none; }

        #welcome .icon {
            width: 80px; height: 80px;
            background: var(--surface);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 20px;
        }

        #welcome h2 { font-size: 20px; margin-bottom: 8px; }
        #welcome p { color: var(--muted); font-size: 14px; }

        /* Input */
        #input-area {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--surface);
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
            border-top: 1px solid #374151;
        }

        #input-area.hidden { display: none; }

        #input-area .row { display: flex; gap: 10px; align-items: flex-end; }

        #msg-input {
            flex: 1;
            background: #374151;
            border: none;
            border-radius: 24px;
            padding: 14px 20px;
            color: var(--text);
            font-size: 15px;
            resize: none;
            max-height: 120px;
        }

        #msg-input::placeholder { color: var(--muted); }
        #msg-input:focus { outline: none; }

        #send-btn {
            width: 48px; height: 48px;
            border: none; border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Status */
        #status {
            position: fixed;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }

        #status.show { opacity: 1; }
        #status .dot { width: 8px; height: 8px; border-radius: 50%; }
        #status .dot.green { background: #10B981; }
        #status .dot.red { background: #EF4444; }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.show { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--surface);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content h3 { margin-bottom: 20px; font-size: 18px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--muted); }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            background: #374151;
            border: 1px solid #4B5563;
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
        }

        .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--primary); }

        .actions { display: flex; gap: 10px; margin-top: 20px; }

        .actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .actions .cancel { background: #374151; color: var(--text); }
        .actions .save { background: var(--primary); color: white; }

        .hint {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
        }

        .provider-info {
            background: rgba(124, 58, 237, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
        }

        .provider-info a { color: var(--primary); }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Chat</h1>
            <button id="btn-settings">⚙️</button>
        </header>

        <main id="chat">
            <div id="welcome">
                <div class="icon">🤖</div>
                <h2>Welcome to AI Chat</h2>
                <p>Configure your AI provider in settings to get started</p>
            </div>
            <div id="messages"></div>
        </main>

        <div id="input-area" class="hidden">
            <div class="row">
                <textarea id="msg-input" placeholder="Type your message..." rows="1"></textarea>
                <button id="send-btn" disabled>➤</button>
            </div>
        </div>

        <div id="status">
            <span class="dot red"></span>
            <span id="status-text">Not configured</span>
        </div>

        <div class="modal" id="settings-modal">
            <div class="modal-content">
                <h3>⚙️ AI Settings</h3>

                <div class="provider-info">
                    Get your API key from the provider's website, then configure below.
                </div>

                <div class="form-group">
                    <label>AI Provider</label>
                    <select id="provider">
                        <option value="openai">OpenAI (GPT-4, GPT-3.5)</option>
                        <option value="anthropic">Anthropic (Claude)</option>
                        <option value="gemini">Google (Gemini)</option>
                        <option value="groq">Groq (Free - Llama, Mixtral)</option>
                        <option value="openrouter">OpenRouter (Many models)</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="ollama">Ollama (Local)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="sk-...">
                    <p class="hint">Your API key is stored locally and never sent to our servers</p>
                </div>

                <div class="form-group" id="model-group">
                    <label>Model</label>
                    <select id="model">
                        <option value="gpt-4o">GPT-4o</option>
                        <option value="gpt-4o-mini">GPT-4o Mini</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </select>
                </div>

                <div class="form-group" id="base-url-group" style="display: none;">
                    <label>Base URL</label>
                    <input type="text" id="base-url" placeholder="http://localhost:11434/v1">
                    <p class="hint">For Ollama or custom endpoints</p>
                </div>

                <div class="form-group">
                    <label>System Prompt</label>
                    <input type="text" id="system-prompt" value="You are a helpful AI assistant.">
                </div>

                <div class="actions">
                    <button class="cancel" id="cancel-btn">Cancel</button>
                    <button class="save" id="save-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = {
            provider: 'openai',
            apiKey: '',
            model: 'gpt-4o',
            baseUrl: '',
            systemPrompt: 'You are a helpful AI assistant.',
            messages: [],
            generating: false,
        };

        const $ = s => document.querySelector(s);

        // Model lists
        const models = {
            openai: [
                { value: 'gpt-4o', label: 'GPT-4o' },
                { value: 'gpt-4o-mini', label: 'GPT-4o Mini' },
                { value: 'gpt-4-turbo', label: 'GPT-4 Turbo' },
                { value: 'gpt-3.5-turbo', label: 'GPT-3.5 Turbo' },
            ],
            anthropic: [
                { value: 'claude-3-5-sonnet-20241022', label: 'Claude 3.5 Sonnet' },
                { value: 'claude-3-5-haiku-20241022', label: 'Claude 3.5 Haiku' },
                { value: 'claude-3-opus-20240229', label: 'Claude 3 Opus' },
            ],
            gemini: [
                { value: 'gemini-2.0-flash', label: 'Gemini 2.0 Flash' },
                { value: 'gemini-1.5-pro', label: 'Gemini 1.5 Pro' },
                { value: 'gemini-1.5-flash', label: 'Gemini 1.5 Flash' },
            ],
            groq: [
                { value: 'llama-3.3-70b-versatile', label: 'Llama 3.3 70B' },
                { value: 'llama-3.1-70b-versatile', label: 'Llama 3.1 70B' },
                { value: 'mixtral-8x7b-32768', label: 'Mixtral 8x7B' },
            ],
            openrouter: [
                { value: 'google/gemma-2-9b-it', label: 'Gemma 2 9B (Free)' },
                { value: 'anthropic/claude-3-haiku', label: 'Claude 3 Haiku (Free)' },
                { value: 'openai/gpt-4o-mini', label: 'GPT-4o Mini' },
            ],
            deepseek: [
                { value: 'deepseek-chat', label: 'DeepSeek Chat' },
                { value: 'deepseek-coder', label: 'DeepSeek Coder' },
            ],
            ollama: [
                { value: 'llama3.2', label: 'Llama 3.2' },
                { value: 'llama3.1', label: 'Llama 3.1' },
                { value: 'qwen2.5', label: 'Qwen 2.5' },
                { value: 'mistral', label: 'Mistral' },
            ],
        };

        // API endpoints
        const endpoints = {
            openai: 'https://api.openai.com/v1/chat/completions',
            anthropic: 'https://api.anthropic.com/v1/messages',
            gemini: 'https://generativelanguage.googleapis.com/v1beta/models',
            groq: 'https://api.groq.com/openai/v1/chat/completions',
            openrouter: 'https://openrouter.ai/api/v1/chat/completions',
            deepseek: 'https://api.deepseek.com/chat/completions',
            ollama: '',
        };

        function init() {
            loadSettings();
            setupEvents();
            updateUI();
        }

        function loadSettings() {
            const saved = localStorage.getItem('ai_chat_settings');
            if (saved) {
                Object.assign(state, JSON.parse(saved));
            }
        }

        function saveSettings() {
            localStorage.setItem('ai_chat_settings', JSON.stringify(state));
        }

        function setupEvents() {
            $('#provider').addEventListener('change', e => {
                state.provider = e.target.value;
                updateModels();
                $('#base-url-group').style.display = state.provider === 'ollama' ? 'block' : 'none';
            });

            $('#send-btn').addEventListener('click', send);
            $('#msg-input').addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    send();
                }
            });

            $('#msg-input').addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 120) + 'px';
            });

            $('#btn-settings').addEventListener('click', openSettings);
            $('#cancel-btn').addEventListener('click', closeSettings);
            $('#save-btn').addEventListener('click', saveSettingsAndClose);
        }

        function updateModels() {
            const select = $('#model');
            select.innerHTML = '';
            const list = models[state.provider] || models.openai;
            list.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.value;
                opt.textContent = m.label;
                select.appendChild(opt);
            });
            if (list.length > 0) {
                select.value = list[0].value;
            }
        }

        function updateUI() {
            $('#provider').value = state.provider;
            $('#api-key').value = state.apiKey;
            $('#base-url').value = state.baseUrl;
            $('#system-prompt').value = state.systemPrompt;
            updateModels();
            $('#base-url-group').style.display = state.provider === 'ollama' ? 'block' : 'none';

            if (state.apiKey || state.provider === 'ollama') {
                $('#input-area').classList.remove('hidden');
                $('#send-btn').disabled = false;
                showStatus('green', 'Ready');
            } else {
                $('#input-area').classList.add('hidden');
                $('#send-btn').disabled = true;
                showStatus('red', 'Configure API key');
            }
        }

        function openSettings() {
            updateModels();
            $('#settings-modal').classList.add('show');
        }

        function closeSettings() {
            $('#settings-modal').classList.remove('show');
        }

        function saveSettingsAndClose() {
            state.provider = $('#provider').value;
            state.apiKey = $('#api-key').value;
            state.model = $('#model').value;
            state.baseUrl = $('#base-url').value;
            state.systemPrompt = $('#system-prompt').value;
            saveSettings();
            closeSettings();
            updateUI();
            showStatus('green', 'Settings saved');
        }

        function showStatus(color, text) {
            const status = $('#status');
            status.querySelector('.dot').className = 'dot ' + color;
            $('#status-text').textContent = text;
            status.classList.add('show');
            setTimeout(() => status.classList.remove('show'), 3000);
        }

        async function send() {
            const input = $('#msg-input');
            const content = input.value.trim();
            if (!content || state.generating) return;

            if (!state.apiKey && state.provider !== 'ollama') {
                showStatus('red', 'Please configure API key');
                return;
            }

            addMsg('user', content);
            input.value = '';
            input.style.height = 'auto';

            state.generating = true;
            $('#send-btn').disabled = true;
            showTyping();

            try {
                const response = await generate(content);
                addMsg('assistant', response);
            } catch (error) {
                addMsg('assistant', 'Error: ' + error.message);
                showStatus('red', 'Error');
            }

            state.generating = false;
            $('#send-btn').disabled = false;
            removeTyping();
        }

        async function generate(userMessage) {
            const provider = state.provider;
            const model = state.model;

            if (provider === 'anthropic') {
                return await callAnthropic(userMessage);
            } else if (provider === 'gemini') {
                return await callGemini(userMessage);
            } else {
                return await callOpenAICompatible(userMessage);
            }
        }

        async function callOpenAICompatible(userMessage) {
            const msgs = [
                { role: 'system', content: state.systemPrompt },
                ...state.messages.map(m => ({ role: m.role, content: m.content })),
                { role: 'user', content: userMessage },
            ];

            let url = endpoints[state.provider];
            if (state.provider === 'ollama' && state.baseUrl) {
                url = state.baseUrl + '/chat/completions';
            }

            const headers = {
                'Content-Type': 'application/json',
            };

            if (state.provider === 'openrouter') {
                headers['Authorization'] = `Bearer ${state.apiKey}`;
                headers['HTTP-Referer'] = 'https://ai-chat.app';
                headers['X-Title'] = 'AI Chat';
            } else if (state.provider === 'groq') {
                headers['Authorization'] = `Bearer ${state.apiKey}`;
            } else if (state.provider === 'deepseek') {
                headers['Authorization'] = `Bearer ${state.apiKey}`;
            } else {
                headers['Authorization'] = `Bearer ${state.apiKey}`;
            }

            const res = await fetch(url, {
                method: 'POST',
                headers,
                body: JSON.stringify({
                    model: state.model,
                    messages: msgs,
                    max_tokens: 2000,
                    temperature: 0.7,
                }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${res.status}`);
            }

            const data = await res.json();
            return data.choices[0].message.content;
        }

        async function callAnthropic(userMessage) {
            const msgs = state.messages.map(m => ({
                role: m.role === 'assistant' ? 'assistant' : 'user',
                content: m.content,
            }));
            msgs.push({ role: 'user', content: userMessage });

            const res = await fetch(endpoints.anthropic, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': state.apiKey,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true',
                },
                body: JSON.stringify({
                    model: state.model,
                    max_tokens: 2000,
                    system: state.systemPrompt,
                    messages: msgs,
                }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${res.status}`);
            }

            const data = await res.json();
            return data.content[0].text;
        }

        async function callGemini(userMessage) {
            const msgs = state.messages.map(m => ({
                role: m.role === 'assistant' ? 'model' : 'user',
                parts: [{ text: m.content }],
            }));
            msgs.push({
                role: 'user',
                parts: [{ text: userMessage }],
            });

            const url = `${endpoints.gemini}/${state.model}:generateContent?key=${state.apiKey}`;

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: msgs,
                    systemInstruction: { parts: [{ text: state.systemPrompt }] },
                    generationConfig: { maxOutputTokens: 2000, temperature: 0.7 },
                }),
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${res.status}`);
            }

            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        function addMsg(role, content) {
            $('#welcome').classList.add('hidden');
            state.messages.push({ role, content });

            const container = $('#messages');
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'user' : ''}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="bubble">
                    <p>${escapeHtml(content)}</p>
                    <span class="time">${time}</span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = $('#messages');
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'msg';
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble typing">
                    <span></span><span></span><span></span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const typing = $('#typing');
            if (typing) typing.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
